{% extends "base.html" %}
{% block title %}Create Task{% endblock %}
{% block content %}
<div class="container-fluid p-4">
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/tasks">Tasks</a></li>
      <li class="breadcrumb-item active">Create</li>
    </ol>
  </nav>
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-1"><i class="bi bi-plus-circle text-primary"></i> Create New Task</h4>
          <p class="text-muted mb-4">Fill in the details to add a new task.</p>
          <form method="POST" action="/tasks/create">
            <div class="mb-3">
              <label class="form-label fw-semibold">Task Name <span class="text-danger">*</span></label>
              <input type="text" name="task_name" class="form-control form-control-lg"
                     placeholder="e.g. Complete Math Assignment" required autofocus/>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Description <span class="text-muted fw-normal">(optional)</span></label>
              <textarea name="description" class="form-control" rows="3"
                        placeholder="Add notes about this task..."></textarea>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">Deadline <span class="text-muted fw-normal">(optional)</span></label>
                <input type="date" name="deadline" class="form-control"/>
                <div class="form-text">Set a deadline to enable risk detection.</div>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">Priority <span class="text-danger">*</span></label>
                <select name="priority" class="form-select">
                  <option value="Low">🟢 Low</option>
                  <option value="Medium" selected>🟡 Medium</option>
                  <option value="High">🔴 High</option>
                </select>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                <i class="bi bi-check-circle"></i> Create Task
              </button>
              <a href="/tasks" class="btn btn-outline-secondary btn-lg">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
