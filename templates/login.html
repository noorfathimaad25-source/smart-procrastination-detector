{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card card shadow">
    <div class="auth-header">
      <i class="bi bi-box-arrow-in-right fs-1"></i>
      <h3 class="mt-2 fw-bold">Welcome Back</h3>
      <p>Log in to continue tracking your goals</p>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Your password" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="bi bi-box-arrow-in-right"></i> Log In
        </button>
      </form>
    </div>
    <div class="card-footer text-center py-3 bg-transparent">
      No account? <a href="/register" class="text-primary fw-semibold">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
