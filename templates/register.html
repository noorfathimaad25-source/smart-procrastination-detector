{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card card shadow">
    <div class="auth-header">
      <i class="bi bi-person-plus-fill fs-1"></i>
      <h3 class="mt-2 fw-bold">Create Account</h3>
      <p>Join and start tracking your productivity</p>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="/register">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="name" class="form-control" placeholder="Your full name" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">
          <i class="bi bi-person-check"></i> Create Account
        </button>
      </form>
    </div>
    <div class="card-footer text-center py-3 bg-transparent">
      Already have an account? <a href="/login" class="text-primary fw-semibold">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
